<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Redirect</title>
</head>
<body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif;background:#111;color:#fff;">
<div>Переход...</div>

<script>
const target = "https://t.me/menstachbot?start=app";

try {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
    Telegram.WebApp.openTelegramLink(target);
  }
} catch (e) {}

// запасной вариант
setTimeout(function(){
  window.location.href = target;
}, 400);
</script>

</body>
</html>
