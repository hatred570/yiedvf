<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body style="margin:0;height:100vh;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:sans-serif;">
<div>Переход...</div>

<script>

Telegram.WebApp.ready();

const VALID_KEY = "go";
const BOT_LINK = "https://t.me/menstachbot";

const startParam = Telegram.WebApp.initDataUnsafe.start_param || "";

if (startParam === VALID_KEY) {

    setTimeout(() => {

        Telegram.WebApp.openTelegramLink(BOT_LINK);

        setTimeout(() => {
            Telegram.WebApp.close();
        }, 600);

    }, 800);

}

</script>

</body>
</html>
