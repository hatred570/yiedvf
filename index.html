<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Redirect</title>
</head>
<body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:#fff;font-family:Arial,sans-serif;">
<div>Переход...</div>

<script>
const targetTme = "https://t.me/menstachbot?start=app";
const targetTg  = "tg://resolve?domain=menstachbot&start=app";

try {
  if (window.Telegram && Telegram.WebApp) {
    Telegram.WebApp.ready();
  }
} catch (e) {}

setTimeout(() => {
  try {
    window.location.href = targetTg;
  } catch (e) {}
}, 150);

setTimeout(() => {
  try {
    window.location.href = targetTme;
  } catch (e) {}
}, 700);
</script>
</body>
</html>
