<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Переход в бот</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #fff;
    }
    .card {
      width: min(92vw, 420px);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(8px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    p {
      margin: 0 0 18px;
      line-height: 1.5;
      color: rgba(255,255,255,0.86);
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Открываем нужного бота</h1>
    <p>Если переход не сработал автоматически, нажми кнопку ниже.</p>
    <button id="openBtn">Открыть @dialolzbot</button>
  </div>

  <script>
    const targetBotLink = 'https://t.me/dialolzbot';

    function openTargetBot() {
      try {
        if (window.Telegram && Telegram.WebApp) {
          Telegram.WebApp.ready();
          Telegram.WebApp.expand();
          Telegram.WebApp.openTelegramLink(targetBotLink);
          return;
        }
      } catch (error) {
        console.error('Telegram redirect error:', error);
      }

      window.location.href = targetBotLink;
    }

    document.getElementById('openBtn').addEventListener('click', openTargetBot);

    // Автопереход через небольшую задержку, чтобы Mini App успел инициализироваться
    setTimeout(openTargetBot, 600);
  </script>
</body>
</html>
